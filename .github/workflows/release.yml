name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build bundle
        run: bun run build

      # Build installers only; a single later job publishes them together to
      # avoid the race where parallel jobs clobber each other's release assets.
      - name: Package
        run: bunx electron-builder --publish never

      - name: Upload installers
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          if-no-files-found: error
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all installers
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Markr ${GITHUB_REF_NAME}

          Unsigned installers for macOS, Windows, and Linux.

          First launch (one time, because the build is unsigned):
          - macOS: right-click Markr.app, choose Open, then confirm. Or System Settings > Privacy & Security > Open Anyway.
          - Windows: on the SmartScreen prompt, click More info, then Run anyway." \
            artifacts/*
